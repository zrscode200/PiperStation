#:schema https://developers.openai.com/codex/config-schema.json

model = "gpt-5.5"
model_reasoning_effort = "medium"
review_model = "gpt-5.5"
sandbox_mode = "workspace-write"
approval_policy = "on-request"
experimental_compact_prompt_file = "compact-prompt.md"

[features]
multi_agent = true
hooks = true
memories = true

[memories]
use_memories = true
generate_memories = true

[agents]
max_threads = 6
max_depth = 1

[agents.architect]
config_file = "./agents/architect.toml"

[agents.docs_researcher]
config_file = "./agents/docs-researcher.toml"

[agents.implementer]
config_file = "./agents/implementer.toml"

[agents.reviewer]
config_file = "./agents/reviewer.toml"

[agents.security_reviewer]
config_file = "./agents/security-reviewer.toml"

[agents.tester]
config_file = "./agents/tester.toml"

[[skills.config]]
path = "./skills/piper-workflow"
enabled = true

[[skills.config]]
path = "./skills/automation-policy"
enabled = true

[[skills.config]]
path = "./skills/review"
enabled = true

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"
